<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ask Ollie - A Friendly Owl Chatbot for Curious Kids</title>
    <meta name="description" content="Ask Ollie is a friendly owl chatbot that answers kids' curious questions in simple, safe, age-appropriate language. Perfect for children ages 6-12 exploring how the world works." />
    <meta name="keywords" content="kids chatbot, children's Q&A app, educational chatbot for kids, safe AI for children, Ask Ollie, owl chatbot, kids learning app" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ask-olie.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ask Ollie - A Friendly Owl Chatbot for Curious Kids" />
    <meta property="og:description" content="A safe, simple chatbot that answers kids' curious questions in warm, age-appropriate language." />
    <meta property="og:url" content="https://ask-olie.vercel.app/" />
    <meta property="og:site_name" content="Ask Ollie" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fa_IR" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Ask Ollie - A Friendly Owl Chatbot for Curious Kids" />
    <meta name="twitter:description" content="A safe, simple chatbot that answers kids' curious questions in warm, age-appropriate language." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Fredoka (headings) + Nunito (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Language alternates for search engines -->
    <link rel="alternate" hreflang="en" href="https://ask-olie.vercel.app/" />
    <link rel="alternate" hreflang="fa" href="https://ask-olie.vercel.app/fa" />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Structured data: helps Google understand what this app is -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Ask Ollie",
      "description": "A friendly owl chatbot that answers kids' curious questions in simple, safe, age-appropriate language.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "audience": {
        "@type": "PeopleAudience",
        "suggestedMinAge": 6,
        "suggestedMaxAge": 12
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
